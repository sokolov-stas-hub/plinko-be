name: ci

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: plinko
          POSTGRES_PASSWORD: plinko
          POSTGRES_DB: plinko
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U plinko"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://plinko:plinko@localhost:5432/plinko
      JWT_ACCESS_SECRET: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
      JWT_REFRESH_SECRET: "fedcba9876543210fedcba9876543210fedcba9876543210fedcba9876543210"
      JWT_ACCESS_TTL: "15m"
      JWT_REFRESH_TTL: "7d"
      MIN_BET: "1000000"
      MAX_BET: "1000000000000"
      PORT: "3000"
      NODE_ENV: test
      LOG_LEVEL: warn
      AVATAR_STORAGE_ENDPOINT: https://example.r2.cloudflarestorage.com
      AVATAR_STORAGE_REGION: auto
      AVATAR_STORAGE_BUCKET: plinko-avatars
      AVATAR_STORAGE_ACCESS_KEY_ID: test-key
      AVATAR_STORAGE_SECRET_ACCESS_KEY: test-secret
      AVATAR_PUBLIC_BASE_URL: https://cdn.example.com

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma migrate deploy
      - run: npm run typecheck
      - run: npm test
      - run: npm run test:e2e

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
